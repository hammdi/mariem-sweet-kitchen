services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: mariem-backend
    restart: unless-stopped
    ports:
      - "3001:3001"
    env_file:
      - ./backend/.env.production
    volumes:
      - backend_uploads:/app/uploads
    networks:
      - mariem-network

  frontend:
    # Prebuilt : attend frontend/dist/ genere localement (VITE_API_URL injecte au build).
    # Pas de build Vite dans ce conteneur -> pas d'OOM sur les petites EC2.
    build:
      context: .
      dockerfile: ./frontend/Dockerfile.prebuilt
    container_name: mariem-frontend
    restart: unless-stopped
    ports:
      - "3000:80"
    depends_on:
      - backend
    networks:
      - mariem-network

volumes:
  backend_uploads:

networks:
  mariem-network:
    driver: bridge