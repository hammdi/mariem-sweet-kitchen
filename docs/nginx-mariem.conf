# Configuration Nginx pour mariem.hamdikbaier.dev
# A copier dans /etc/nginx/sites-available/mariem sur l'EC2,
# PUIS creer le lien symbolique vers sites-enabled.
#
# Ce fichier gere UNIQUEMENT le sous-domaine mariem.*
# Il coexiste avec la config de l'autre projet (evalpro) qui utilise
# d'autres server_name et d'autres ports (5173, 5001, 5432).
#
# Installation :
#   sudo cp docs/nginx-mariem.conf /etc/nginx/sites-available/mariem
#   sudo ln -s /etc/nginx/sites-available/mariem /etc/nginx/sites-enabled/
#   sudo nginx -t && sudo systemctl reload nginx
#
# SSL : cette config part en HTTP. Certbot ajoutera le bloc HTTPS automatiquement.
#   sudo certbot --nginx -d mariem.hamdikbaier.dev

# Upstream = le container frontend exposé sur le port 3000 de l'hôte.
# Le container frontend contient lui-meme un nginx qui proxy /api/* vers
# le container backend (service name "backend" sur le reseau Docker interne).
# On a donc un seul entry point cote hote : le port 3000.

server {
    listen 80;
    listen [::]:80;
    server_name mariem.hamdikbaier.dev;

    # Taille max des uploads (images recettes)
    client_max_body_size 10M;

    # Logs dedies a ce site (pratique pour debug sans polluer les logs de evalpro)
    access_log /var/log/nginx/mariem-access.log;
    error_log /var/log/nginx/mariem-error.log;

    # Proxy vers le container frontend (qui contient son propre nginx + API proxy)
    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        # Timeouts corrects pour les requetes longues (IA, exports, etc.)
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }
}
