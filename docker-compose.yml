services:
  mongodb:
    image: mongo:6.0
    container_name: mariem-mongodb
    restart: unless-stopped
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: password123
      MONGO_INITDB_DATABASE: mariem_kitchen
    volumes:
      - mongodb_data:/data/db
      - ./docker/mongo-init.js:/docker-entrypoint-initdb.d/mongo-init.js:ro
    networks:
      - mariem-network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: mariem-backend
    restart: unless-stopped
    ports:
      - "3001:3001"
    environment:
      NODE_ENV: production
      PORT: 3001
      MONGODB_URI: mongodb://admin:password123@mongodb:27017/mariem_kitchen?authSource=admin
      JWT_SECRET: mariem-sweet-kitchen-jwt-secret-2026
      JWT_EXPIRES_IN: 7d
      ADMIN_EMAIL: admin@mariemkitchen.com
      ADMIN_PASSWORD: admin123
      RATE_LIMIT_MAX_REQUESTS: 1000
      CORS_ORIGIN: http://localhost:3000
    depends_on:
      - mongodb
    volumes:
      - backend_uploads:/app/uploads
    networks:
      - mariem-network

  frontend:
    build:
      context: .
      dockerfile: ./frontend/Dockerfile
      args:
        VITE_API_URL: http://localhost:3001/api
    container_name: mariem-frontend
    restart: unless-stopped
    ports:
      - "3000:80"
    depends_on:
      - backend
    networks:
      - mariem-network

volumes:
  mongodb_data:
  backend_uploads:

networks:
  mariem-network:
    driver: bridge
